<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Ceci n'est pas une page</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #e0f7fa;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      color: #00796b;
    }

    h1 {
      font-size: 8em;
      margin: 0;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
      40% {transform: translateY(-30px);}
      60% {transform: translateY(-15px);}
    }

    p {
      font-size: 1.5em;
      margin: 10px 0;
    }

    .lego {
      margin-top: 30px;
      font-size: 5em;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #00796b;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s;
    }

    a:hover {
      background-color: #004d40;
    }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Ceci n'est pas une page</p>
  <p>Oops! Looks like this page got lost in a Lego world 🧱</p>
  <div class="lego">🧱🧱🧱</div>
  <a href="/">Go Back Home</a>
</body>
</html>
